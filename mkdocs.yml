site_name: miniQMT 文档
site_description: 无人值守量化交易系统 + XtQuantManager HTTP 网关
site_url: https://weihong-su.github.io/miniQMT/
repo_url: https://github.com/weihong-su/miniQMT
repo_name: weihong-su/miniQMT
docs_dir: docs/site
site_dir: site
edit_uri: edit/main/docs/site/
copyright: "Business Source License 1.1 &mdash; 商业用途需获授权 &bull; 2030-04-13 后转 MIT"

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search:
      lang: en
  - include-markdown
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            members_order: source
            heading_level: 2

watch:
  - grid_trading_manager.py
  - grid_database.py
  - grid_validation.py
  - position_manager.py
  - xtquant_manager
  - xtquant_manager/stop_profit.py
  - CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - 首页: index.md

  - miniQMT 核心系统:
    - 概述: miniqmt/index.md
    - 架构说明: miniqmt/architecture.md
    - 配置参考: miniqmt/configuration.md
    - 止盈止损策略: miniqmt/stop-profit-loss.md
    - 网格交易: miniqmt/grid-trading.md
    - 自动买入: miniqmt/autobuy.md
    - 大QMT文件 IPC: miniqmt/qmt-ipc-fallback.md
    - 大QMT RPC Redis 部署: miniqmt/qmt-rpc-redis-setup.md
    - Web 前端（web1.0 / web2.0）: miniqmt/web-frontend.md
    - Web API: miniqmt/web-api.md
    - 无人值守运行: miniqmt/unattended.md
    - 数据库表结构: miniqmt/database.md
    - 测试框架: miniqmt/testing.md
    - 常见问题: miniqmt/faq.md

  - XtQuantManager:
    - 概述: xqm/index.md
    - 架构说明: xqm/architecture.md
    - 配置指南:
      - 概述: xqm/configuration/index.md
      - 单账号（开发/测试）: xqm/configuration/single-account.md
      - 双账号（多策略）: xqm/configuration/dual-account.md
      - 局域网共享: xqm/configuration/lan.md
      - 嵌入 miniQMT: xqm/configuration/embedded.md
      - 无人值守: xqm/configuration/unattended.md
      - 全量参数参考: xqm/configuration/reference.md
    - API 手册:
      - 概述: xqm/api/index.md
      - 账号管理: xqm/api/accounts.md
      - 交易操作: xqm/api/trading.md
      - 行情接口: xqm/api/market.md
      - 可观测性: xqm/api/observability.md
      - curl 速查表: xqm/api/curl-cheatsheet.md
    - 使用指南:
      - 多账号实战: xqm/guides/multi-account.md
      - 安全配置: xqm/guides/security.md
      - 可观测性实战: xqm/guides/observability.md
      - 与 miniQMT 集成: xqm/guides/miniqmt-integration.md
    - 参考:
      - Python SDK: xqm/sdk.md
      - 服务管理脚本: xqm/service-management.md
      - 常见问题: xqm/faq.md

  - 源码 API:
    - 概述: api/index.md
    - 网格交易:
      - grid_trading_manager: api/grid-trading-manager.md
      - grid_database: api/grid-database.md
      - grid_validation: api/grid-validation.md
    - 持仓与执行:
      - position_manager: api/position-manager.md
    - XtQuantManager:
      - account: api/xqm-account.md
      - manager: api/xqm-manager.md
      - health_monitor: api/xqm-health.md
      - server: api/xqm-server.md
      - stop_profit: api/xqm-stop-profit.md

  - 变更日志: changelog.md

  - 许可证: license.md
