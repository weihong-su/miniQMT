[Environment]
# Environment type: conda or uv
ENV_TYPE=uv

# Conda virtual environment name (used when ENV_TYPE=conda)
CONDA_ENV=python39

# UV virtual environment directory (used when ENV_TYPE=uv)
UV_VENV_DIR=.venv

[Project]
# Project working directory
WORK_DIR=c:\github-repo\miniQMT

# GitHub repository URL (for cloning)
GITHUB_REPO=https://github.com/weihong-su/miniQMT

# Path to requirements file (relative to WORK_DIR)
REQUIREMENTS_FILE=utils/requirements.txt

[Script]
# Python script to run
PYTHON_SCRIPT=main.py

# Script arguments (optional)
# Example: SCRIPT_ARGS=--config prod --port 8080
SCRIPT_ARGS=
