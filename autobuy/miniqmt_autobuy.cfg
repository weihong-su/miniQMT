# =============================================================================
# miniQMT 自动买入模块 (miniqmt_autobuy) 配置文件
# 格式: INI (configparser)。修改后重启 autobuy 进程生效。
# 由 miniqmt.bat 菜单 [j] 启动 / [k] 停止 / [l] 状态 / [m] 日志。
# =============================================================================

[web]
# 目标账号的 web_server 地址。多账号时改端口 (5000/5001/...)。
base_url = http://127.0.0.1:5000
# 对应主程序环境变量 QMT_API_TOKEN。web 未启用鉴权时留空。
api_token =
# HTTP 请求超时(秒)
timeout = 8

[pool]
# 候选池所在 SQLite 文件
db_path = C:\github-repo\stockquant\chan.db
# 候选池表名 (多表并集，逗号分隔)。每表各自取运行日前 N 个交易日后合并去重。
# 两表列名需一致 (code_column / date_column)
tables = stg_chan, zs_pool
# 股票代码字段 (候选池格式如 sh.600025，会自动转成系统标准 600025.SH)
code_column = code
# 日期字段 (标准日期文本 YYYY-MM-DD)
date_column = date
# 取运行日前最近 N 个交易日的股票。比如运行日为周日 2026-06-14 时，
# latest_n_dates=2 会筛选 2026-06-12 和 2026-06-11 两个交易日。
# 注意: 数据批量较大时 (如 stg_chan 单日可达数百只)，可设为 1 只取前一交易日。
latest_n_dates = 2

[filter]
# --- 大盘指数门禁 ---
# 自动买入前固定检查 999999 / 399001 / 399005。
# 至少一个指数 MA5 向上才继续执行个股筛选和下单；三者都不向上则本轮不买入。

# --- 换手率条件 (用户举例"成交量大于5%" = 换手率) ---
enable_turnover_rate = true
min_turnover_rate = 0.05
# 成交量单位换算系数: 数据源 volume 为"手"时填 100(转成股); 已是"股"填 1。
volume_unit_multiplier = 100

# --- 量比条件 ---
enable_volume_ratio = true
min_volume_ratio = 2.0

# --- (可选) 当日涨幅条件, 默认关闭 ---
enable_pct_change = false
min_pct_change = 0.05

# --- MA8 均线方向: 要求向上 ---
enable_ma8_uptrend = true

# --- 现价相对 MA8 位置: 现价 <= MA8 * ratio ---
enable_price_below_ma8_ratio = true
max_price_to_ma8_ratio = 1.07

# --- 涨停/停牌跳过 ---
skip_limit_up = true

[risk]
# 已持仓该股则跳过 (查 web /api/positions)
dedup_by_position = true
# autobuy 历史 N 天内买过该股则跳过。0 = 仅当天, -1 = 永久不再买
dedup_window_days = 1
# 每次触发最多买入只数 (默认随机选 1 只)
max_buys_per_run = 1

[schedule]
# 触发模式: daily(每日定点) | interval(固定间隔) | both(两者都启用)
mode = both
# 每日定点时刻, 逗号分隔多个, 如 09:35,14:45
daily_times = 14:45
# 固定间隔(分钟), 仅交易时段内触发
interval_minutes = 30
# true = 非交易时段不触发(复用 config.is_trade_time())
only_trade_time = true
